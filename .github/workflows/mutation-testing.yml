name: Mutation Testing

on:
  schedule:
    # Sunday 04:00 UTC — weekly mutation score check on revenue-critical paths.
    # Slow (~15-30 min) so we don't run it on every PR. Catches AI-test-theater:
    # tests that pass coverage but don't actually assert anything meaningful.
    - cron: "0 4 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      # Run on PRs that touch the mutated code (stripe + security libs).
      - "src/lib/stripe/**"
      - "src/lib/security/**"
      - "tests/unit/lib/stripe/**"
      - "tests/unit/lib/security/**"

concurrency:
  group: stryker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  mutation:
    name: Stryker (stripe + security)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run Stryker
        run: npm run test:mutation
        env:
          # Stryker dashboard token (optional — leave empty if not used).
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

      - name: Comment PR with mutation score
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/mutation/index.html';
            if (!fs.existsSync(path)) {
              core.info('No mutation report generated.');
              return;
            }
            const body = [
              '## Mutation testing report',
              '',
              'Stryker ran against `src/lib/stripe/` + `src/lib/security/`.',
              `Report artifact: \`mutation-report\` (download from this run).`,
              '',
              'Thresholds: high 80 / low 60 / break 50.',
              'Mutation score < 50 → CI fails. Bump unit tests to kill the surviving mutants.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
